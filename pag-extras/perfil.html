<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sanchez:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <script>
      document.documentElement.className += " js";
    </script>
  </head>
  <body>
    <header class="header-tarefa">
      <div class="menu">
        <a href="../index.html"
          ><img class="marca" src="../img/marca.svg" alt="Marca"
        /></a>
        <nav>
          <button
            data-menu="mobile"
            class="inativo"
            aria-expanded="false"
            aria-controls="menu"
          ></button>
          <ul data-menu="lista">
            <li><a href="../index.html">INÍCIO</a></li>
            <li><a href="./tarefas.html">TAREFAS</a></li>
            <li><a href="./categoria.html">CATEGORIAS</a></li>
            <li><a href="./perfil.html">PERFIL</a></li>
          </ul>
        </nav>
        <nav data-menu="fixed" aria-label="Navegação para Mobile">
          <ul data-menu="icones">
            <li>
              <a href="../index.html"
                ><img src="../img/inicio.svg" alt="Inicio"
              /></a>
            </li>
            <li>
              <a href="../pag-extras/tarefas.html"
                ><img src="../img/tarefas.svg" alt="Tarefas"
              /></a>
            </li>
            <li>
              <a href="../pag-extras/categoria.html"
                ><img src="../img/categorias.svg" alt="Categorias"
              /></a>
            </li>
            <li>
              <a href="../pag-extras/perfil.html"
                ><img src="../img/perfil.svg" alt="Perfil"
              /></a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="perfil" aria-label="Perfil do Usuário">
      <h1>Visão geral das tarefas</h1>
      <div class="resumo-tarefas-flex">
        <div class="item-resumo-tarefa flex-1" data-perfil="concluida">
          <h2></h2>
          <p>Tarefas Concluídas</p>
        </div>
        <div class="item-resumo-tarefa flex-1" data-perfil="progresso">
          <h2></h2>
          <p>Tarefas Em Progresso</p>
        </div>
        <div class="item-resumo-tarefa flex-2" data-perfil="pendente">
          <h2></h2>
          <p>Tarefas A Fazer</p>
        </div>
      </div>
      <div class="progresso">
        <h2>Tarefas</h2>
        <div class="p-progresso">
          <p>Progresso</p>
          <span></span>
        </div>
        <div class="progresso-bar"></div>
      </div>
      <div class="config">
        <h2>Configurações Gerais</h2>
        <div class="tema">
          <h3>Tema -</h3>
          <div data-tema="config">Claro</div>
          <div data-tema="config">Escuro</div>
        </div>
      </div>
    </section>
    <script src="../dist/main.js"></script>
  </body>
</html>
